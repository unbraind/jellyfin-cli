name: Release Prepare

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to validate and package'
        required: true
        default: 'main'
        type: string

permissions:
  contents: read

concurrency:
  group: release-prepare-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Validate and Build Release Artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.5'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Full release validation
        run: bun run validate:release

      - name: Verify changelog exists
        run: test -f CHANGELOG.md

      - name: Create release metadata
        run: |
          mkdir -p artifacts
          VERSION="$(node -p 'require("./package.json").version')"
          LAST_TAG="$(git describe --tags --abbrev=0 2>/dev/null || true)"

          {
            echo "# Release Candidate ${VERSION}"
            echo
            echo "- Ref: ${{ inputs.ref }}"
            echo "- Commit: $(git rev-parse HEAD)"
            echo "- Generated: $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
            echo
            echo "## Validation"
            echo
            echo "- bun run validate:release: passed"
            echo
            echo "## Changes"
            echo
            if [ -n "${LAST_TAG}" ]; then
              echo "Changes since ${LAST_TAG}:"
              echo
              git log --no-merges --pretty='- %h %s (%an)' "${LAST_TAG}"..HEAD
            else
              echo "No tags found; showing latest commits:"
              echo
              git log --no-merges --pretty='- %h %s (%an)' -n 30
            fi
          } > artifacts/release-notes.md

          tar -czf "artifacts/jellyfin-cli-${VERSION}-dist.tar.gz" dist
          shasum -a 256 "artifacts/jellyfin-cli-${VERSION}-dist.tar.gz" > artifacts/SHA256SUMS.txt

      - name: Upload release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-candidate-${{ github.run_number }}
          path: artifacts/
