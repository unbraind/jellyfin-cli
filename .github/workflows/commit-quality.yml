name: Commit Quality

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  semantic-pr-title:
    name: Semantic PR Title
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Validate PR title
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            chore
            ci
            build
            test
            refactor
            perf
            revert

  commit-subjects:
    name: Commit Subject Style
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate commit subjects in PR range
        run: |
          set -euo pipefail
          RANGE="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"
          PATTERN='^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\([a-z0-9][a-z0-9-]*\))?!?: .{1,72}$'
          BAD=0

          while IFS= read -r subject; do
            if ! printf '%s' "$subject" | grep -Eq "$PATTERN"; then
              echo "Invalid commit subject: $subject"
              BAD=1
            fi
          done < <(git log --format=%s "$RANGE")

          if [ "$BAD" -ne 0 ]; then
            echo "Commit subject validation failed."
            exit 1
          fi

          echo "Commit subjects are valid."
