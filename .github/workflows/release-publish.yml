name: Release Publish (Manual)

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to publish'
        required: true
        default: 'main'
        type: string
      confirm_publish:
        description: 'Type YES_PUBLISH to publish to npm'
        required: true
        default: 'NO'
        type: string
      dry_run:
        description: 'Run publish flow without uploading package'
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  id-token: write

concurrency:
  group: release-publish
  cancel-in-progress: false

jobs:
  publish:
    name: Publish Package
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: release

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.5'

      - name: Setup Node for npm publish
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Full release validation
        run: bun run validate:release

      - name: Verify changelog exists
        run: test -f CHANGELOG.md

      - name: Print package identity
        run: |
          echo "name=$(node -p 'require(\"./package.json\").name')"
          echo "version=$(node -p 'require(\"./package.json\").version')"

      - name: Dry run publish
        if: ${{ inputs.dry_run }}
        run: npm publish --dry-run

      - name: Validate confirmation for real publish
        if: ${{ !inputs.dry_run }}
        run: |
          if [ "${{ inputs.confirm_publish }}" != "YES_PUBLISH" ]; then
            echo "Refusing publish: confirm_publish must be YES_PUBLISH"
            exit 1
          fi

      - name: Publish to npm with provenance
        if: ${{ !inputs.dry_run }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public

      - name: Verify install via npx (published package)
        if: ${{ !inputs.dry_run }}
        run: |
          set -euo pipefail
          VERSION="$(node -p 'require("./package.json").version')"
          for i in $(seq 1 12); do
            if npx --yes "jellyfin-cli@${VERSION}" --version; then
              exit 0
            fi
            echo "npx verification not ready yet (attempt ${i}/12); retrying in 10s..."
            sleep 10
          done
          echo "npx verification failed after retries."
          exit 1

      - name: Verify install via bunx (published package)
        if: ${{ !inputs.dry_run }}
        run: |
          set -euo pipefail
          VERSION="$(node -p 'require("./package.json").version')"
          for i in $(seq 1 12); do
            if bunx "jellyfin-cli@${VERSION}" --version; then
              exit 0
            fi
            echo "bunx verification not ready yet (attempt ${i}/12); retrying in 10s..."
            sleep 10
          done
          echo "bunx verification failed after retries."
          exit 1
