name: Release Publish (Manual)

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to publish'
        required: true
        default: 'main'
        type: string
      confirm_publish:
        description: 'Type YES_PUBLISH to publish to npm'
        required: true
        default: 'NO'
        type: string
      dry_run:
        description: 'Run publish flow without uploading package'
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  id-token: write

concurrency:
  group: release-publish
  cancel-in-progress: false

jobs:
  publish:
    name: Publish Package
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.5'

      - name: Setup Node for npm publish
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Full release validation
        run: bun run validate:release

      - name: Print package identity
        run: |
          echo "name=$(node -p \"require('./package.json').name\")"
          echo "version=$(node -p \"require('./package.json').version\")"

      - name: Dry run publish
        if: ${{ inputs.dry_run }}
        run: npm publish --dry-run

      - name: Validate confirmation for real publish
        if: ${{ !inputs.dry_run }}
        run: |
          if [ "${{ inputs.confirm_publish }}" != "YES_PUBLISH" ]; then
            echo "Refusing publish: confirm_publish must be YES_PUBLISH"
            exit 1
          fi

      - name: Publish to npm with provenance
        if: ${{ !inputs.dry_run }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public
